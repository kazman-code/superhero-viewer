<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
  <ion-back-button defaultHref="/home"></ion-back-button>
</ion-buttons>
    <ion-title>Heroes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true">

  <div *ngIf="loading" style="padding: 20px; font-size: 20px;">
    Loading...
  </div>

  <div style="padding: 10px;">
    <ion-searchbar
      [(ngModel)]="searchTerm"
      (ionInput)="filterComics()"
      placeholder="Search heroes..."
      color="light"
    ></ion-searchbar>
  </div>

  <div *ngIf="!loading" style="padding: 10px;">
    <ion-card *ngFor="let hero of filteredComics" (click)="openDetail(hero.id)">
      <ion-item lines="none">
        <ion-avatar slot="start">
          <img [src]="hero.images.sm" />
        </ion-avatar>

        <ion-label>
          <h2>{{ hero.name }}</h2>
          <p>{{ hero.biography.publisher }}</p>
        </ion-label>
      </ion-item>
    </ion-card>
  </div>

  <div style="color: black; font-size: 20px; margin-top: 20px; text-align:center;">
    Loaded: {{ filteredComics.length }}
  </div>

</ion-content>
